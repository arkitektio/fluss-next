fragment FlussStringAssignWidget on StringAssignWidget {
  __typename
  kind
  placeholder
  asParagraph
}

fragment FlussSliderAssignWidget on SliderAssignWidget {
  __typename
  kind
  min
  max
}

fragment FlussSearchAssignWidget on SearchAssignWidget {
  __typename
  kind
  query
  ward
}

fragment FlussCustomAssignWidget on CustomAssignWidget {
  __typename
  ward
  hook
}

fragment FlussChoiceAssignWidget on ChoiceAssignWidget {
  __typename
  kind
  choices {
    value
    label
    description
  }
}

fragment FlussChildArgPortNested on ArgPort {
  __typename
  kind
  identifier
  children {
    kind
    identifier
    widget {
      __typename
      kind
      ...FlussStringAssignWidget
      ...FlussSearchAssignWidget
      ...FlussSliderAssignWidget
      ...FlussChoiceAssignWidget
      ...FlussCustomAssignWidget
    }
  }
  widget {
    __typename
    kind
    ...FlussStringAssignWidget
    ...FlussSearchAssignWidget
    ...FlussSliderAssignWidget
    ...FlussChoiceAssignWidget
    ...FlussCustomAssignWidget
  }
}

fragment FlussChildArgPort on ArgPort {
  __typename
  kind
  identifier
  children {
    ...FlussChildArgPortNested
  }
  widget {
    __typename
    kind
    ...FlussStringAssignWidget
    ...FlussSearchAssignWidget
    ...FlussSliderAssignWidget
    ...FlussChoiceAssignWidget
    ...FlussCustomAssignWidget
  }
  nullable
}

fragment FlussChildReturnPortNested on ReturnPort {
  __typename
  kind
  identifier
  children {
    kind
    identifier
    widget {
      __typename
      kind
      ...FlussCustomReturnWidget
      ...FlussChoiceReturnWidget
    }
  }
  widget {
    __typename
    kind
    ...FlussCustomReturnWidget
    ...FlussChoiceReturnWidget
  }
}

fragment FlussChildReturnPort on ReturnPort {
  __typename
  kind
  identifier
  children {
    ...FlussChildReturnPortNested
  }
  widget {
    __typename
    kind
    ...FlussCustomReturnWidget
    ...FlussChoiceReturnWidget
  }
  nullable
}

fragment FlussCustomEffect on CustomEffect {
  __typename
  kind
  hook
  ward
}

fragment FlussMessageEffect on MessageEffect {
  __typename
  kind
  message
}

fragment Validator on Validator {
  function
  dependencies
}

fragment FlussArgPort on ArgPort {
  __typename
  key
  label
  nullable
  description
  effects {
    kind
    function
    dependencies
    ...FlussCustomEffect
    ...FlussMessageEffect
  }
  widget {
    __typename
    kind
    ...FlussStringAssignWidget
    ...FlussSearchAssignWidget
    ...FlussSliderAssignWidget
    ...FlussChoiceAssignWidget
    ...FlussCustomAssignWidget
  }
  kind
  identifier
  children {
    ...FlussChildArgPort
  }
  default
  validators {
    ...Validator
  }
}

fragment FlussReturnPort on ReturnPort {
  __typename
  key
  label
  nullable
  description
  effects {
    kind
    function
    dependencies
    ...FlussCustomEffect
    ...FlussMessageEffect
  }
  widget {
    __typename
    kind
    ...FlussCustomReturnWidget
    ...FlussChoiceReturnWidget
  }
  kind
  identifier
  children {
    ...FlussChildReturnPort
  }
  default
}

fragment FlussCustomReturnWidget on CustomReturnWidget {
  __typename
  kind
  hook
  ward
}

fragment FlussChoiceReturnWidget on ChoiceReturnWidget {
  __typename
  choices {
    label
    value
    description
  }
}
